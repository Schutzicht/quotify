<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, follow">
    <title>Pagina niet gevonden | Offertje</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            background: radial-gradient(700px 380px at 70% 0%, rgba(99, 102, 241, .14), transparent 70%), #fff;
            color: #1e293b; min-height: 100vh; display: grid; place-items: center; text-align: center; padding: 24px;
        }
        .mark { width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg, #6366f1, #4338ca); display: grid; place-items: center; color: #fff; margin: 0 auto 26px; box-shadow: 0 18px 40px -12px rgba(99, 102, 241, .5); }
        .mark svg { width: 30px; height: 30px; }
        h1 { font-size: clamp(2.4rem, 8vw, 4rem); color: #0f172a; letter-spacing: -.03em; }
        p { color: #475569; font-size: 1.1rem; margin: 12px 0 30px; max-width: 440px; }
        .links { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
        .btn { font-weight: 700; padding: 14px 26px; border-radius: 12px; text-decoration: none; transition: transform .25s; }
        .btn:hover { transform: translateY(-2px); }
        .primary { background: linear-gradient(135deg, #6366f1, #4338ca); color: #fff; box-shadow: 0 18px 40px -12px rgba(99, 102, 241, .45); }
        .ghost { background: #fff; color: #0f172a; border: 1px solid #e2e8f0; }
    </style>
</head>

<body>
    <div>
        <div class="mark">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <path d="M9 13h6M9 17h4" />
            </svg>
        </div>
        <h1>404</h1>
        <p>Deze pagina bestaat niet (meer). Geen zorgen, je maakt zo weer een offerte of leest verder in de kennisbank.</p>
        <div class="links">
            <a class="btn primary" href="/app">Offerte maken</a>
            <a class="btn ghost" href="/blog/">Naar de blog</a>
            <a class="btn ghost" href="/">Naar home</a>
        </div>
    </div>
</body>

</html>
